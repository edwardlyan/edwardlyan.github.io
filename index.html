<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edward Yan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:   #f7f5f2;
      --ink:  #1a1916;
      --mute: #9a9690;
      --rule: #dedad5;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Lora', serif;
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 0.01em;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      min-height: 100%;
    }

    main {
      max-width: 480px;
      width: 100%;
      opacity: 0;
      transform: translateY(12px);
      animation: arrive 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
    }

    @keyframes arrive {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Name ── */
    h1 {
      font-family: 'Lora', serif;
      font-size: clamp(2.4rem, 6vw, 3.2rem);
      font-weight: 300;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 2rem;
    }

    h1 em {
      font-style: italic;
      font-weight: 300;
    }

    /* ── Divider ── */
    hr {
      border: none;
      border-top: 1px solid var(--rule);
      margin-bottom: 2rem;
    }

    /* ── Bio ── */
    .bio {
      font-size: 20px;
      line-height: 1.85;
      color: var(--ink);
      margin-bottom: 2.5rem;
    }

    /* ── Links ── */
    nav {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    nav a {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      color: var(--ink);
      text-decoration: none;
      font-size: 16px;
      letter-spacing: 0.06em;
      transition: color 0.2s;
    }

    nav a::before {
      content: '→';
      font-style: normal;
      color: var(--mute);
      transition: transform 0.2s, color 0.2s;
    }

    nav a:hover { color: var(--mute); }
    nav a:hover::before { transform: translateX(3px); color: var(--ink); }

    /* ── Footer ── */
    footer {
      margin-top: 3.5rem;
      font-size: 11px;
      color: var(--rule);
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <main>
    <h1>Edward Yan</h1>
    <hr />
    <p class="bio">
      I am an undergraduate student at The University of Texas at Austin majoring in electrical and computer engineering. My interests also include science, mathematics, and music.
    </p>
    <nav>
      <a href="mailto:e@edwardlyan.com">Email: e@edwardlyan.com</a>
    </nav>
  </main>
</body>
</html>
